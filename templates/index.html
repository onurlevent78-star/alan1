<!doctype html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Rezervasyon Formu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(120deg, #e0ecff 0%, #b3d8fd 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .rez-card {
            background: rgba(255,255,255,0.97);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(179,216,253,0.18);
            padding: 40px 30px;
            max-width: 1000px;
            width: 100%;
        }
        .rez-title {
            font-size: 2rem;
            font-weight: 700;
            color: #3498db;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .rez-form-group {
            margin-bottom: 1.5rem;
        }
        .rez-list {
            margin-top: 2rem;
        }
        .rez-list table {
            width: 100%;
            border-collapse: collapse;
        }
        .rez-list th, .rez-list td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .rez-list th {
            background-color: #f2f2f2;
        }
        .btn-info {
            background-color: #17a2b8;
            border-color: #17a2b8;
        }
        .btn-info:hover {
            background-color: #138496;
            border-color: #117a8b;
        }
    </style>
</head>
<body>

<div class="rez-card">
    <div class="rez-title">Rezervasyon Formu</div>
    <form method="post">
        <!-- Form içeriği buraya gelecek -->
    </form>
    <div class="rez-list">
        <!-- Rezervasyon listesinin içeriği buraya gelecek -->
    </div>
    <!-- Takvim Butonu -->
    <div class="text-center mt-4">
        <button type="button" class="btn btn-info" data-bs-toggle="modal" data-bs-target="#takvimModal">
            <i class="fa-solid fa-calendar-days"></i> Aylık Takvimde Göster
        </button>
    </div>
</div>

<!-- Takvim Modalı -->
<div class="modal fade" id="takvimModal" tabindex="-1" aria-labelledby="takvimModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="takvimModalLabel">Aylık Rezervasyon Takvimi</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Kapat"></button>
      </div>
      <div class="modal-body">
        <div id="calendar"></div>
      </div>
    </div>
  </div>
</div>

<!-- FullCalendar ve gerekli JS -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    if (calendarEl) {
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'tr',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: ''
            },
            events: [
                {% for r in reservations %}
                {
                    title: '{{ r.ad_soyad }} - {{ r.kultur_merkezi }} - {{ r.saat }}',
                    start: '{{ r.tarih }}',
                    description: '{{ r.aciklama|e }}'
                },
                {% endfor %}
            ],
            eventClick: function(info) {
                alert(info.event.title + "\n" + info.event.extendedProps.description);
            }
        });
        // Takvim modal açıldığında render et
        var takvimModal = document.getElementById('takvimModal');
        takvimModal.addEventListener('shown.bs.modal', function () {
            calendar.render();
        });
    }
});
</script>

<!-- Bootstrap JS (Opsiyonel, sadece modal için gerekli) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
